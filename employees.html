<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees | EmpAnalytics</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <img src="assets/logo.png" alt="EmpAnalytics Logo">
                </div>
                <span class="logo-text">Emp Analytics</span>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="employees.html" class="nav-link active"><i class="fas fa-users"></i><span>Employees</span></a>
                <a href="tasks.html" class="nav-link"><i class="fas fa-check-square"></i><span>Tasks</span></a>
                <a href="performance.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>Performance</span></a>
                <a href="attrition.html" class="nav-link"><i class="fas fa-user-minus"></i><span>Attrition</span></a>
                <a href="index.html" class="nav-link" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; color: #ff4444;"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></a>
            </nav>
            <div class="sidebar-bottom">
                <div class="user-card">
                    <div class="user-avatar" style="width: 40px; height: 40px; border-radius: 8px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">HA</div>
                    <div>
                        <p style="font-weight: 600; font-size: 0.85rem;">HR Admin</p>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">Super Admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="top-left">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <i class="fas fa-bars mobile-toggle" id="mobileToggle" style="display: none; cursor: pointer; font-size: 1.25rem;"></i>
                        <div>
                            <h2>Employee Directory</h2>
                            <p>Manage and monitor your global workforce</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="card fade-up">
                    <div class="card-header">
                        <input type="text" id="employeeSearch" placeholder="Search by name, role or dept..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); width: 300px; font-family: 'Outfit';">
                        <button class="btn btn-primary" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">+ Add Employee</button>
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border);">
                                <th style="padding: 12px; color: var(--text-muted); font-weight: 500;">Employee</th>
                                <th style="padding: 12px; color: var(--text-muted); font-weight: 500;">Department</th>
                                <th style="padding: 12px; color: var(--text-muted); font-weight: 500;">Status</th>
                                <th style="padding: 12px; color: var(--text-muted); font-weight: 500;">Performance</th>
                                <th style="padding: 12px; color: var(--text-muted); font-weight: 500;">Role</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
    <script src="js/config.js"></script>
    <script src="js/employees.js"></script>
</body>
</html>
